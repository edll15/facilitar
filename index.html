<!DOCTYPE html>
<html>
<head>
  <title>Gerador de Resumo de Alta</title>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 15px;
      padding: 10px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      background-color: #2c7be5;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #1a5fd0;
    }

    #resultado {
      background: white;
      padding: 15px;
      margin-top: 20px;
      white-space: pre-wrap;
      border-radius: 5px;
    }
  </style>

</head>

<body>

<h2>Gerador de Resumo de Alta</h2>

<label><strong>Anamnese:</strong></label>
<textarea id="anamnese" placeholder="Cole aqui a anamnese completa..."></textarea>

<label><strong>Reavaliação:</strong></label>
<textarea id="reavaliacao" placeholder="Cole aqui a reavaliação..."></textarea>

<button onclick="gerarResumo()">Gerar Resumo</button>

<div id="resultado"></div>

<script>
function gerarResumo() {
  const anamnese = document.getElementById("anamnese").value;
  const reavaliacao = document.getElementById("reavaliacao").value;

  function extrairDiagnostico(texto) {
    const t = texto.toLowerCase();

    if (t.includes("pneumonia")) return "Pneumonia";
    if (t.includes("lombalgia")) return "Lombalgia";
    if (t.includes("cefaleia")) return "Cefaleia";
    if (t.includes("infecção urinária")) return "Infecção do trato urinário";
    if (t.includes("ivas")) return "Infecção de vias aéreas superiores";

    return "Quadro clínico em investigação";
  }

  const diagnostico = extrairDiagnostico(anamnese + " " + reavaliacao);

  const resumo = `
RESUMO DE ALTA

Paciente atendido em pronto-socorro.

ANAMNESE:
${anamnese}

EVOLUÇÃO / REAVALIAÇÃO:
${reavaliacao}

DIAGNÓSTICO:
${diagnostico}

CONDUTA:
Paciente avaliado, medicado conforme necessidade, com melhora clínica durante observação.

ALTA:
Recebe alta em bom estado geral.

ORIENTAÇÕES:
- Retornar em caso de piora
- Seguir uso correto das medicações
- Procurar acompanhamento ambulatorial
`;

  document.getElementById("resultado").innerText = resumo;
}
</script>

</body>
</html>
