<!DOCTYPE html>
<html>
<head>
  <title>Facilitador - Resumo de Alta</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #eaf7f0;
    }

    .header {
      background-color: #1e7d4f;
      color: white;
      padding: 15px 20px;
      font-size: 24px;
      font-family: "Times New Roman", serif;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }

    .container {
      max-width: 800px;
      margin: 100px auto 20px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #1e7d4f;
    }

    label {
      font-weight: bold;
      color: #1e7d4f;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 5px;
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      background-color: #1e7d4f;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #16633d;
    }

    #resultado {
      background: #f9f9f9;
      padding: 15px;
      margin-top: 20px;
      white-space: pre-wrap;
      border-radius: 5px;
      border-left: 5px solid #1e7d4f;
    }
  </style>

</head>

<body>

<div class="header">
  Facilitador
</div>

<div class="container">

<h2>Gerador de Resumo de Alta</h2>

<label>Anamnese:</label>
<textarea id="anamnese" placeholder="Cole aqui a anamnese..."></textarea>

<label>Reavaliação:</label>
<textarea id="reavaliacao" placeholder="Cole aqui a reavaliação..."></textarea>

<label>Exames laboratoriais:</label>
<textarea id="lab" placeholder="Ex: Hb 12, leucócitos 8.000..."></textarea>

<label>Exames de imagem:</label>
<textarea id="imagem" placeholder="Ex: RX tórax sem alterações..."></textarea>

<button onclick="gerarResumo()">Gerar Resumo</button>

<div id="resultado"></div>

</div>

<script>
function gerarResumo() {
  const anamnese = document.getElementById("anamnese").value;
  const reavaliacao = document.getElementById("reavaliacao").value;
  const lab = document.getElementById("lab").value;
  const imagem = document.getElementById("imagem").value;

  function extrairDiagnostico(texto) {
    const t = texto.toLowerCase();

    if (t.includes("pneumonia")) return "Pneumonia";
    if (t.includes("lombalgia")) return "Lombalgia";
    if (t.includes("cefaleia")) return "Cefaleia";
    if (t.includes("infecção urinária")) return "Infecção do trato urinário";
    if (t.includes("ivas")) return "Infecção de vias aéreas superiores";

    return "Quadro clínico em investigação";
  }

  const diagnostico = extrairDiagnostico(
    anamnese + " " + reavaliacao + " " + lab + " " + imagem
  );

  const resumo = `
RESUMO DE ALTA

Paciente atendido em pronto-socorro.

ANAMNESE:
${anamnese}

EVOLUÇÃO / REAVALIAÇÃO:
${reavaliacao}

EXAMES LABORATORIAIS:
${lab || "Não realizados ou sem alterações relevantes."}

EXAMES DE IMAGEM:
${imagem || "Não realizados ou sem alterações relevantes."}

DIAGNÓSTICO:
${diagnostico}

CONDUTA:
Paciente avaliado, medicado conforme necessidade, com melhora clínica durante observação.

ALTA:
Recebe alta em bom estado geral.

ORIENTAÇÕES:
- Retornar em caso de piora
- Seguir uso correto das medicações
- Procurar acompanhamento ambulatorial
`;

  document.getElementById("resultado").innerText = resumo;
}
</script>

</body>
</html>
